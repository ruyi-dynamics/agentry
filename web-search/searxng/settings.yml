use_default_settings: true

general:
  instance_name: "Agentry SearXNG"
  debug: false

search:
  safe_search: 0
  autocomplete: ""
  default_lang: "auto"
  formats:
    - html
    - json
    - csv
    - rss

server:
  bind_address: "0.0.0.0"
  port: 8080
  secret_key: "agentry-searxng-secret-key-change-me"
  limiter: false
  image_proxy: false
  method: "GET"

ui:
  default_theme: simple
  static_use_hash: true

outgoing:
  request_timeout: 10
  max_request_timeout: 15
